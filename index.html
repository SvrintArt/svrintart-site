<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SvrintART</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Georgia,"Times New Roman",serif;
background:#050505;
color:white;
}

.hero{
height:100vh;
background:
linear-gradient(rgba(0,0,0,.35),rgba(0,0,0,.60)),
url("hero.png") center center/cover no-repeat;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

nav{
position:fixed;
top:0;
left:0;
width:100%;
padding:26px 60px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,.35);
backdrop-filter:blur(8px);
}

.logo{
font-size:32px;
font-weight:normal;
}

.logo span{
color:#d6a228;
}

nav ul{
display:flex;
gap:42px;
list-style:none;
font-size:15px;
letter-spacing:3px;
}

.content{
max-width:1100px;
padding:20px;
}

h1{
font-size:92px;
font-weight:normal;
margin-bottom:10px;
}

h1 span{
color:#d6a228;
}

.author{
font-size:34px;
margin-top:20px;
}

.role{
margin-top:8px;
letter-spacing:8px;
color:#d6a228;
font-size:15px;
margin-bottom:55px;
}

.quote{
font-style:italic;
font-size:27px;
line-height:1.45;
margin-bottom:55px;
}

.statement{
font-size:38px;
margin-bottom:55px;
}

.buttons{
display:flex;
justify-content:center;
gap:26px;
}

.btn{
padding:14px 28px;
border:1px solid #d6a228;
text-decoration:none;
letter-spacing:3px;
font-size:11px;
font-weight:bold;
}

.dark{
color:white;
background:transparent;
}

.gold{
background:#d6a228;
color:black;
}
</style>

</head>

<body>

<nav>

<div class="logo">
Svrint<span>ART</span>
</div>

<ul>
<li>HOME</li>
<li>GALLERY</li>
<li>MANIFESTO</li>
<li>ABOUT</li>
<li>CONTACT</li>
</ul>

</nav>

<section class="hero">

<div class="content">

<h1>Svrint<span>ART</span></h1>

<div class="author">
Pio Cecchini
</div>

<div class="role">
AESTHETICS EXPLORER
</div>

<div class="quote">
“The Soul said to its Image:<br>
I will break through the walls of your doorless room; your fate is my own.”
</div>

<div class="statement">
The line is not drawn. It is provoked.
</div>

<div class="buttons">

<a class="btn dark" href="#">
EXPLORE THE GALLERY
</a>

<a class="btn gold" href="#">
READ THE MANIFESTO
</a>

</div>

</div>

</section>

</body>
</html>
