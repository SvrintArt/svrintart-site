<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SvrintART</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Georgia, serif;
    color:white;
    background:#000;
}

.hero{
    height:100vh;
    background:
    linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.55)),
    url("q.png") center center/cover no-repeat;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.content{
    max-width:900px;
    padding:20px;
}

h1{
    font-size:96px;
    font-weight:300;
    letter-spacing:2px;
    margin-bottom:20px;
}

.gold{
    color:#d6a22a;
}

.subtitle{
    font-size:24px;
    letter-spacing:4px;
    margin-bottom:50px;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:25px;
    flex-wrap:wrap;
}

a{
    text-decoration:none;
}

.btn1{
    color:white;
    border:2px solid #d6a22a;
    padding:18px 42px;
    transition:.3s;
}

.btn1:hover{
    background:#d6a22a;
    color:black;
}

.btn2{
    background:#d6a22a;
    color:black;
    padding:18px 42px;
    font-weight:bold;
    transition:.3s;
}

.btn2:hover{
    background:#f2bf47;
}

footer{
    position:absolute;
    bottom:25px;
    width:100%;
    text-align:center;
    letter-spacing:4px;
    color:#ddd;
    font-size:14px;
}
</style>

</head>

<body>

<section class="hero">

<div class="content">

<h1>Svrint<span class="gold">ART</span></h1>

<div class="subtitle">
DIGITAL SURREAL ART • FINE ART PRINTS • INTERIOR DESIGN
</div>

<div class="buttons">
<a href="#" class="btn1">VIEW GALLERY</a>
<a href="#" class="btn2">ABOUT SVRINTART</a>
</div>

</div>

<footer>
© 2026 SvrintART
</footer>

</section>

</body>
</html>
