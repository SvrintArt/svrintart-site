<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SvrintART</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
    font-family:Georgia,"Times New Roman",serif;
    background:#050505;
    color:#fff;
}
.hero{
    height:100vh;
    background:
        linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.45)),
        url('hero.png') center center/cover no-repeat;
    display:flex;
    flex-direction:column;
}
nav{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    padding:28px 50px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:rgba(0,0,0,.35);
    backdrop-filter:blur(10px);
    z-index:1000;
}
.logo{
    color:#fff;
    text-decoration:none;
    font-size:30px;
    font-weight:600;
}
.logo span{color:#d8a437;}
nav ul{
    display:flex;
    list-style:none;
    gap:42px;
}
nav a{
    text-decoration:none;
    color:#4b4b4b;
    font-size:14px;
    letter-spacing:3px;
    font-weight:700;
    transition:all .35s ease;
}
nav a:hover{
    color:#ffffff;
    text-shadow:0 0 8px rgba(255,255,255,.45);
}
.content{
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}
h1{
    font-size:100px;
    font-weight:500;
    line-height:1;
    margin-bottom:20px;
}
h1 span{color:#d8a437;}
.author{
    font-size:32px;
    margin-bottom:12px;
}
.subtitle{
    color:#d8a437;
    letter-spacing:8px;
    font-size:16px;
    margin-bottom:60px;
}
.buttons{
    display:flex;
    gap:24px;
    flex-wrap:wrap;
    justify-content:center;
}
.btn{
    padding:18px 42px;
    text-decoration:none;
    font-size:13px;
    letter-spacing:3px;
    font-weight:bold;
    transition:.35s;
}
.btn-outline{
    color:#fff;
    border:1px solid #d8a437;
}
.btn-outline:hover{
    background:#d8a437;
    color:#111;
}
.btn-gold{
    background:#d8a437;
    color:#111;
}
.btn-gold:hover{
    background:#e7bc57;
}
@media(max-width:900px){
    nav{padding:20px;}
    nav ul{gap:18px;}
    h1{font-size:68px;}
    .author{font-size:24px;}
    .subtitle{font-size:13px;letter-spacing:5px;}
}
</style>
</head>
<body>
<section class="hero">
<nav>
<a href="#" class="logo">Svrint<span>ART</span></a>
<ul>
<li><a href="index.html">HOME</a></li>
<li><a href="gallery.html">GALLERY</a></li>
<li><a href="manifesto.html">MANIFESTO</a></li>
<li><a href="about.html">ABOUT</a></li>
<li><a href="contact.html">CONTACT</a></li>
</ul>
</nav>

<div class="content">
<h1>Svrint<span>ART</span></h1>
<div class="author">Pio Cecchini</div>
<div class="subtitle">AESTHETICS EXPLORER</div>

<div class="buttons">
<a href="gallery.html" class="btn btn-outline">EXPLORE THE GALLERY</a>
<a href="manifesto.html" class="btn btn-gold">READ THE MANIFESTO</a>
</div>
</div>
</section>
</body>
</html>
